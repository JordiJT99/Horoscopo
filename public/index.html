<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AstroMística : Tarot, Horóscopo y Carta Natal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1A142B, #2D1B3D);
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 90%;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid #E11D48;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .button {
            background: #E11D48;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .button:hover {
            background: #C41E3A;
            transform: scale(1.05);
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 AstroMística</h1>
        <p>Tu App de Tarot, Horóscopo y Carta Natal</p>
        
        <div class="status" id="status">
            <div class="loader"></div>
            <p>Aplicación iniciada correctamente ✅</p>
        </div>

        <button class="button" onclick="goToWebsite()">
            🌟 Abrir AstroMística Web
        </button>
        
        <button class="button" onclick="testConnection()">
            🔗 Probar Conexión
        </button>

        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        console.log('AstroMística App iniciada correctamente');
        
        function goToWebsite() {
            document.getElementById('result').innerHTML = '<p>Redirigiendo a astromistica.org...</p>';
            setTimeout(() => {
                window.open('https://astromistica.org', '_blank');
            }, 1000);
        }
        
        function testConnection() {
            document.getElementById('result').innerHTML = '<p>Probando conexión...</p>';
            
            fetch('https://astromistica.org', { mode: 'no-cors' })
                .then(() => {
                    document.getElementById('result').innerHTML = '<p style="color: #4CAF50;">✅ Conexión exitosa</p>';
                })
                .catch((error) => {
                    document.getElementById('result').innerHTML = '<p style="color: #FF6B6B;">❌ Error de conexión: ' + error.message + '</p>';
                });
        }
        
        // Auto-test al cargar
        setTimeout(() => {
            document.getElementById('status').innerHTML = '<p>✅ App funcionando correctamente</p>';
        }, 2000);
    </script>
</body>
</html>
